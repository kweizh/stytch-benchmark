with a 401 status code.\n- The server must listen on port 3000.\n- Use the `stytch` npm package.\n- Configure the Stytch client using the `STYTCH_PROJECT_ID` and `STYTCH_SECRET` environment variables.\n\n## Implementation Guide\n1. Initialize a Node.js project in `/home/user/stytch-app`.\n2. Install `express` and `stytch`.\n3. Create `index.js` setting up the Express server with JSON body parsing.\n4. Initialize the Stytch client using environment variables.\n5. Implement the `POST /login` and `GET /authenticate` routes as specified.\n\n## Constraints\n- Project path: `/home/user/stytch-app`\n- Start command: `node index.js`\n- Port: `3000`\n- STYTCH_PROJECT_ID and STYTCH_SECRET will be provided in the environment.\n\n## Integrations\n- Stytch"])</script><script>self.__next_f.push([1,"9:T5de,"])</script><script>self.__next_f.push([1,"# Stytch Connected Apps PKCE Implementation\n\n## Background\nStytch Connected Apps allows your application to act as an OAuth/OIDC Authorization Server. For public clients, the Authorization Code Flow with PKCE is mandatory. You need to implement the PKCE utilities and token exchange logic in Node.js.\n\n## Requirements\n1. Initialize a Node.js project in `/home/user/stytch_pkce`.\n2. Create a file `pkce.js` that exports the following functions:\n   - `generatePKCE()`: Returns `{ codeVerifier, codeChallenge }`. The `codeVerifier` must be a cryptographically random string (at least 43 chars). `codeChallenge` must be the base64url-encoded SHA-256 hash of the verifier.\n   - `buildAuthorizeUrl(authEndpoint, clientId, redirectUri, scopes, codeChallenge)`: Constructs and returns the OAuth 2.0 authorization URL string. It must include `response_type=code`, `code_challenge_method=S256`, `client_id`, `redirect_uri`, `scope`, and `code_challenge`.\n   - `exchangeToken(tokenEndpoint, clientId, code, codeVerifier, redirectUri)`: Makes a POST request to the token endpoint with a JSON body containing `client_id`, `grant_type: 'authorization_code'`, ath: `/home/user/stytch_app`\n- The script must output only the requested ID (`phone_id` or `user_id`) to stdout on success, without any additional text.\n\n## Integrations\n- Stytch"])</script><script>self.__next_f.push([1,"b:T5a3,"])</script><script>self.__next_f.push([1,"# Stytch Passkeys with Express\n\n## Background\nCreate an Express REST API that integrates Stytch WebAuthn (Passkeys) for authentication using the Stytch Node.js SDK.\n\n## Requirements\n- Initialize a Node.js project in `/home/user/app`.\n- Install `express` and `stytch`.\n- Create `server.js` that sets up the Express server on port 3000.\n- Initialize the Stytch B2C client using `STYTCH_PROJECT_ID` and `STYTCH_SECRET` environment variables.\n- Implement the following POST endpoints. They should parse JSON bodies and return the raw JSON responses from the Stytch SDK.\n  - `POST /webauthn/register/start`: Accepts `user_id` and `domain`. Calls `stytchClient.webauthn.registerStart({ user_id, domain, use_base64_url_encoding: true })` and returns the response.\n  - `POST /webauthn/register`: Accepts `user_id` and `public_key_credential`. Calls `stytchClient.webauthn.register({ user_id, public_key_credential })` and returns the response.\n  - `POST /webauthn/authenticate/start`: Accepts `domain`. Calls `stytchClient.webauthn.authenticateStart({ domain })` and returns the response.\n  - `POST /webauthn/authenticate`: Accepts `public_key_credential`. Calls `stytchClient.webauthn.authenticate({ public_key_credential })` and returns the response.\n\n## Constraints\n- Project path: `/home/user/app`\n- Start command: `node server.js`\n- Port: 3000\n- Return the exact JSON response returned by the Stytch SDK (or the Stytch error object if it throws)."])</script><script>self.__next_f.push([1,"c:T46d,# Verify Stytch B2C Session\n\n## Background\nStytch is a developer-first identity platform. In this task, you will use the Stytch Node.js SDK to verify a B2C `session_token`.\n\n## Requirements\n- Write a Node.j
